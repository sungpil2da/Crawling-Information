<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우리동네 생활정보방 · 서울</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gothic+A1:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF1EA; --card:#FFFFFF; --ink:#2A2E27; --muted:#7A7E72;
    --honey:#E9A522; --honey-ink:#7A5205; --forest:#3C6E52; --line:#E0E2D8; --radius:14px;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--paper); color:var(--ink);
    font-family:"Gothic A1",system-ui,sans-serif; font-size:16px; line-height:1.6; -webkit-font-smoothing:antialiased}
  .wrap{max-width:600px; margin:0 auto; padding:0 16px 64px}
  .board{position:sticky; top:0; z-index:10; background:var(--paper); padding-top:18px}
  .board::after{content:""; display:block; height:1px; background:var(--line); margin-top:14px}
  .title{font-family:"Jua",sans-serif; font-size:30px; line-height:1.1; margin:0; display:flex; align-items:center; gap:8px}
  .title .dot{width:12px;height:12px;border-radius:50%;background:var(--honey);display:inline-block}
  .live{font-size:11px; font-weight:700; color:var(--forest); border:1px solid var(--forest); border-radius:999px; padding:1px 8px; margin-left:4px; font-family:"Gothic A1"}
  .subtitle{margin:4px 0 4px; color:var(--muted); font-size:14px}
  .synced{margin:0 0 14px; color:var(--forest); font-size:13px; font-weight:500}
  .controls{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
  .search{flex:1 1 160px; min-width:140px; display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:8px 14px}
  .search input{border:0; outline:0; width:100%; font:inherit; background:transparent; color:var(--ink)}
  .search svg{flex:0 0 auto; color:var(--muted)}
  button,.toggle{font:inherit; cursor:pointer}
  .btn{background:var(--card); border:1px solid var(--line); border-radius:999px; padding:8px 14px; color:var(--ink); font-weight:500; transition:border-color .15s}
  .btn:hover{border-color:var(--forest)}
  .btn:focus-visible,.search:focus-within,.toggle:focus-visible{outline:2px solid var(--honey); outline-offset:2px}
  .toggle{display:inline-flex; align-items:center; gap:6px; font-size:14px; color:var(--muted); user-select:none}
  .toggle input{accent-color:var(--forest); width:16px; height:16px}
  .cats{display:flex; flex-wrap:wrap; gap:6px; margin-top:12px}
  .cat{font:inherit; font-size:13px; cursor:pointer; border:1px solid var(--line); background:var(--card); color:var(--muted); border-radius:999px; padding:5px 13px; transition:all .12s}
  .cat:hover{border-color:var(--forest)}
  .cat.on{background:var(--forest); border-color:var(--forest); color:#fff; font-weight:700}
  .admin{margin-top:16px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card); overflow:hidden}
  .admin summary{cursor:pointer; padding:14px 16px; font-family:"Jua",sans-serif; font-size:16px; list-style:none; user-select:none}
  .admin summary::-webkit-details-marker{display:none}
  .admin summary::before{content:"⚙️ "}
  .admin .body{padding:0 16px 16px}
  .src{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--line)}
  .src input[type=checkbox]{width:18px; height:18px; accent-color:var(--forest); flex:0 0 auto}
  .src .info{flex:1; min-width:0}
  .src .nm{font-weight:700; font-size:14px}
  .src .u{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .src .badge{font-size:11px; color:var(--forest); background:#EAF1EC; padding:2px 7px; border-radius:999px; flex:0 0 auto}
  .src .del{flex:0 0 auto; border:0; background:none; cursor:pointer; color:#C0503A; font-size:18px; line-height:1; padding:4px}
  .addform{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; padding-top:14px; border-top:2px solid var(--line)}
  .addform input, .addform select{font:inherit; font-size:14px; border:1px solid var(--line); border-radius:10px; padding:8px 10px}
  .addform input.url{flex:1 1 100%}
  .addform input.nm{flex:1 1 140px}
  .addform .add{background:var(--forest); color:#fff; border:0; border-radius:10px; padding:8px 16px; font-weight:700; cursor:pointer}
  .admin .hint{font-size:12px; color:var(--muted); margin:10px 0 0}
  .feed{margin-top:20px; display:flex; flex-direction:column; gap:14px}
  .card{position:relative; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 16px 14px; transition:transform .12s ease, box-shadow .12s ease}
  .card:hover{transform:translateY(-1px); box-shadow:0 4px 14px rgba(42,46,39,.06)}
  .card-top{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .tag{font-size:12px; font-weight:700; color:var(--forest); background:#EAF1EC; padding:3px 9px; border-radius:999px; white-space:nowrap}
  .date{font-size:12px; color:var(--muted)}
  .card h2{margin:0 0 6px; font-size:17px; line-height:1.4; font-weight:700}
  .card h2 a{color:var(--ink); text-decoration:none}
  .card h2 a:hover{text-decoration:underline; text-decoration-color:var(--honey)}
  .summary{margin:0; font-size:14px; color:#5C6055; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .pin{position:absolute; top:-8px; right:14px; background:var(--honey); color:var(--honey-ink); font-family:"Jua",sans-serif; font-size:12px; padding:3px 9px; border-radius:6px; transform:rotate(-3deg); box-shadow:0 2px 5px rgba(233,165,34,.35)}
  .card.seen{opacity:.72} .card.seen .tag{background:#EFF0EC; color:var(--muted)}
  .pickwrap{position:absolute; top:12px; left:12px; display:none}
  .pickwrap input{width:20px; height:20px; accent-color:var(--forest); cursor:pointer}
  body.pickmode .pickwrap{display:block}
  body.pickmode .card{padding-left:44px}
  .card-top{padding-left:0}
  /* 복사 선택 팝오버 */
  .copywrap{position:relative; display:inline-block}
  .menu{position:absolute; top:calc(100% + 6px); left:0; z-index:30; background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:0 6px 20px rgba(42,46,39,.12); padding:6px; min-width:150px; display:none}
  .menu.open{display:block}
  .menu button{display:block; width:100%; text-align:left; font:inherit; font-size:14px; border:0; background:none; cursor:pointer; padding:9px 12px; border-radius:8px; color:var(--ink)}
  .menu button:hover{background:#F1F3EC}
  .btn-danger{color:#C0503A}
  #delAll{color:#C0503A}
  .state{text-align:center; padding:48px 16px; color:var(--muted)}
  .state .big{font-family:"Jua",sans-serif; font-size:20px; color:var(--ink); margin-bottom:6px}
  .skel{height:96px; border-radius:var(--radius); background:linear-gradient(90deg,#fff,#F4F5F0,#fff); background-size:200% 100%; animation:sh 1.2s infinite}
  @keyframes sh{to{background-position:-200% 0}}
  footer{margin-top:22px; text-align:center; color:var(--muted); font-size:12px}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  @media (max-width:480px){
    /* 모바일: 상단을 컴팩트하게 + sticky 해제해서 기사 영역 최대화 */
    .board{position:static; padding-top:12px}
    .board::after{margin-top:10px}
    .title{font-size:23px}
    .subtitle{font-size:13px; margin:3px 0 2px}
    .synced{font-size:12px; margin:0 0 10px}
    .controls{gap:6px}
    .btn{padding:7px 12px; font-size:14px}
    .search{flex:1 1 100%; padding:7px 13px}
    .toggle{flex:0 0 auto}
    .cats{margin-top:9px; gap:5px}
    .cat{padding:4px 11px; font-size:12px}
    .admin{margin-top:12px}
    .admin summary{padding:12px 14px; font-size:15px}
    .menu{min-width:140px}
    .menu button{padding:11px 12px}
    .feed{gap:12px; margin-top:14px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="board">
    <h1 class="title"><span class="dot"></span>우리동네 생활정보방<span class="live">LIVE</span></h1>
    <p class="subtitle">서울 지역 소식을 실시간으로 모아드려요</p>
    <p class="synced" id="lastSync">마지막 동기화: 불러오는 중…</p>
    <div class="controls">
      <label class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="q" type="search" placeholder="검색 (예: 축제, 모집)" aria-label="소식 검색">
      </label>
      <label class="toggle"><input type="checkbox" id="onlyNew"> 새 글만</label>
      <button class="btn" id="sync">🔄 지금 동기화</button>
      <span class="copywrap">
        <button class="btn" id="copy">카톡용 복사</button>
        <div class="menu" id="copyMenu">
          <button id="copyAll">전체 복사</button>
          <button id="copyPick">개별 선택</button>
        </div>
      </span>
      <span class="copywrap">
        <button class="btn btn-danger" id="del">기사 삭제</button>
        <div class="menu" id="delMenu">
          <button id="delAll">전체 삭제</button>
          <button id="delPick">개별 선택</button>
        </div>
      </span>
      <button class="btn" id="markAll">모두 읽음</button>
    </div>
    <div class="cats" id="cats"></div>
  </header>
  <details class="admin">
    <summary>출처 관리 (RSS 켜기/끄기 · 추가/삭제)</summary>
    <div class="body">
      <div id="srcList"></div>
      <div class="addform">
        <input class="url" id="newUrl" type="url" placeholder="RSS 주소 (https://...xml)">
        <input class="nm" id="newName" type="text" placeholder="이름 (예: 서울신문)">
        <select id="newCat">
          <option value="뉴스">뉴스</option>
          <option value="문화">문화</option>
          <option value="생활">생활</option>
          <option value="공지">공지</option>
          <option value="기타">기타</option>
        </select>
        <button class="add" id="addSrc">추가</button>
      </div>
      <p class="hint">체크를 켜고/끄면 다음 크롤링부터 반영돼요. 변경 후 새 소식은 최대 30분 뒤(또는 수동 실행 시 바로) 들어옵니다.</p>
    </div>
  </details>
  <main class="feed" id="feed" aria-live="polite">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </main>
  <footer id="meta"></footer>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ⬇⬇⬇ Firebase 콘솔 > 프로젝트 설정 > 내 앱(웹) 에서 복사해 붙여넣기 ⬇⬇⬇
const firebaseConfig = {
  apiKey: "AIzaSyD_RY8IWhScD3GdJdbh9sRMnrOj2h9GdAA",
  authDomain: "crawling-infor.firebaseapp.com",
  databaseURL: "https://crawling-infor-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "crawling-infor",
  storageBucket: "crawling-infor.firebasestorage.app",
  messagingSenderId: "1086896728355",
  appId: "1:1086896728355:web:efb09d6e837c6328d2c496",
  measurementId: "G-7R8WFJEYD1"
};
// ⬆⬆⬆ 여기까지 ⬆⬆⬆

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const SEEN_KEY = "dongnae_seen_v1";
const seen = new Set(JSON.parse(localStorage.getItem(SEEN_KEY) || "[]"));
const saveSeen = () => localStorage.setItem(SEEN_KEY, JSON.stringify([...seen].slice(-3000)));
let ALL = [];
let curCat = "전체";   // 선택된 분류
const picked = new Set();   // 카톡 복사용 체크된 링크들
const $ = (id) => document.getElementById(id);

function relTime(s){
  const t=Date.parse(s); if(!t) return s?s.slice(0,16):"";
  const m=Math.floor((Date.now()-t)/60000);
  if(m<1)return"방금"; if(m<60)return m+"분 전";
  const h=Math.floor(m/60); if(h<24)return h+"시간 전";
  const d=Math.floor(h/24); if(d<7)return d+"일 전";
  return new Date(t).toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"});
}
const esc=(s)=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function visibleItems(){
  const q=$("q").value.trim(), onlyNew=$("onlyNew").checked;
  return ALL.filter(it=>{
    if(curCat!=="전체" && (it.cat||"기타")!==curCat) return false;
    if(onlyNew && seen.has(it.link)) return false;
    if(q && !(it.title+it.summary+it.source).includes(q)) return false;
    return true;
  });
}
// 칩 UI 그리기: 전체 + 데이터에 존재하는 분류들, 각 개수 표시
function renderCats(){
  const counts={};
  ALL.forEach(it=>{const c=it.cat||"기타"; counts[c]=(counts[c]||0)+1;});
  const cats=["전체", ...Object.keys(counts).sort()];
  $("cats").innerHTML=cats.map(c=>{
    const n = c==="전체" ? ALL.length : counts[c];
    return `<button class="cat ${c===curCat?"on":""}" data-cat="${esc(c)}">${esc(c)} ${n}</button>`;
  }).join("");
}
function render(){
  const items=visibleItems(), feed=$("feed");
  if(!items.length){
    feed.innerHTML=`<div class="state"><div class="big">텅 비었네요</div>${$("onlyNew").checked?"새로 올라온 소식이 없어요. ‘새 글만’을 꺼보세요.":"아직 수집된 소식이 없어요."}</div>`;
    return;
  }
  feed.innerHTML=items.map(it=>{
    const isNew=!seen.has(it.link);
    return `<article class="card ${isNew?"":"seen"}">${isNew?'<span class="pin">NEW</span>':""}
      <label class="pickwrap"><input type="checkbox" class="pick" data-link="${esc(it.link)}" ${picked.has(it.link)?"checked":""}></label>
      <div class="card-top"><span class="tag">${esc(it.source)}</span>${it.cat?`<span class="date">· ${esc(it.cat)}</span>`:""}<span class="date">${esc(relTime(it.date))}</span></div>
      <h2><a href="${esc(it.link)}" target="_blank" rel="noopener">${esc(it.title)}</a></h2>
      ${it.summary?`<p class="summary">${esc(it.summary)}</p>`:""}</article>`;
  }).join("");
  if(typeof updateCopyLabel==="function") updateCopyLabel();
}

// Firebase 실시간 구독 — 함수가 새 글을 넣으면 이 화면이 자동으로 갱신됨
onValue(ref(database,"feed"), (snap)=>{
  const val=snap.val()||{};
  ALL=Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(Date.parse(b.date)||b.addedAt||0)-(Date.parse(a.date)||a.addedAt||0));
  const nc=ALL.filter(it=>!seen.has(it.link)).length;
  $("meta").textContent=`총 ${ALL.length}개 · 새 글 ${nc}개 · 실시간 동기화 중`;
  renderCats();
  render();
}, (err)=>{
  $("feed").innerHTML=`<div class="state"><div class="big">연결에 실패했어요</div>Firebase 설정(firebaseConfig)과 DB 규칙을 확인해주세요.<br><small>(${esc(err.message)})</small></div>`;
});

// 마지막 동기화 시각 구독
function syncText(ts){
  if(!ts) return "마지막 동기화: 아직 없음";
  const m=Math.floor((Date.now()-ts)/60000);
  let rel;
  if(m<1) rel="방금 전"; else if(m<60) rel=m+"분 전";
  else{const hh=Math.floor(m/60); rel = hh<24 ? hh+"시간 전" : new Date(ts).toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});}
  return "🕒 마지막 동기화: "+rel;
}
let lastSyncTs=0;
onValue(ref(database,"meta/lastSync"), (snap)=>{
  lastSyncTs=snap.val()||0;
  $("lastSync").textContent=syncText(lastSyncTs);
});
// 1분마다 "N분 전" 표기 갱신
setInterval(()=>{ if(lastSyncTs) $("lastSync").textContent=syncText(lastSyncTs); }, 60000);

function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),1800);}
function doCopy(chosen){
  if(!chosen.length){toast("복사할 소식이 없어요");return;}
  const today=new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
  const text=`📢 우리동네 새 소식 (${today})\n\n`+chosen.map((it,i)=>`${i+1}. [${it.source}] ${it.title}\n${it.link}`).join("\n\n");
  navigator.clipboard.writeText(text).then(
    ()=>toast(`${chosen.length}개 복사 완료! 카톡방에 붙여넣으세요`),
    ()=>toast("복사 실패"));
}
$("cats").addEventListener("click",(e)=>{
  const b=e.target.closest(".cat"); if(!b) return;
  curCat=b.dataset.cat; renderCats(); render();
});
$("q").addEventListener("input",render);
$("onlyNew").addEventListener("change",render);
// ===== 복사/삭제 공용: 전체 / 개별 선택 =====
// pickMode: null | "copy" | "delete"  — 개별 선택 모드에서 어떤 작업인지
let pickMode = null;
function updateModeLabels(){
  $("copy").textContent = pickMode==="copy"   ? `선택 복사 (${picked.size})` : "카톡용 복사";
  $("del").textContent  = pickMode==="delete" ? `선택 삭제 (${picked.size})` : "기사 삭제";
}
function enterPickMode(mode){
  pickMode = mode;
  document.body.classList.add("pickmode");
  $("copyMenu").classList.remove("open");
  $("delMenu").classList.remove("open");
  picked.clear();
  document.querySelectorAll(".pick").forEach(cb=>cb.checked=false);
  updateModeLabels();
  toast(mode==="copy" ? "복사할 소식을 체크하고 ‘선택 복사’를 누르세요" : "삭제할 소식을 체크하고 ‘선택 삭제’를 누르세요");
}
function exitPickMode(){
  pickMode = null;
  document.body.classList.remove("pickmode");
  picked.clear();
  document.querySelectorAll(".pick").forEach(cb=>cb.checked=false);
  updateModeLabels();
}
// 호환용 별칭 (render 에서 호출)
function updateCopyLabel(){ updateModeLabels(); }

// 카드 체크박스 → picked 갱신
$("feed").addEventListener("change",(e)=>{
  const cb=e.target.closest(".pick"); if(!cb) return;
  if(cb.checked) picked.add(cb.dataset.link); else picked.delete(cb.dataset.link);
  updateModeLabels();
});

// 여러 기사 한 번에 삭제 (link 기준으로 _key 찾아서 remove)
function deleteItems(chosen){
  if(!chosen.length){ toast("삭제할 소식이 없어요"); return; }
  if(!confirm(`${chosen.length}개 기사를 삭제할까요?`)) return;
  const updates={};
  chosen.forEach(it=>{ if(it._key) updates["feed/"+it._key]=null; });
  update(ref(database), updates)
    .then(()=>toast(`${chosen.length}개 삭제했어요`))
    .catch(err=>toast("삭제 실패: "+err.message));
}

// ----- 카톡용 복사 버튼 -----
$("copy").addEventListener("click",(e)=>{
  e.stopPropagation();
  if(pickMode==="copy"){
    const chosen=visibleItems().filter(it=>picked.has(it.link));
    if(!chosen.length){ toast("선택된 소식이 없어요"); return; }
    doCopy(chosen); exitPickMode();
  }else{
    $("delMenu").classList.remove("open");
    $("copyMenu").classList.toggle("open");
  }
});
$("copyAll").addEventListener("click",(e)=>{ e.stopPropagation(); $("copyMenu").classList.remove("open"); doCopy(visibleItems()); });
$("copyPick").addEventListener("click",(e)=>{ e.stopPropagation(); enterPickMode("copy"); });

// ----- 기사 삭제 버튼 -----
$("del").addEventListener("click",(e)=>{
  e.stopPropagation();
  if(pickMode==="delete"){
    const chosen=visibleItems().filter(it=>picked.has(it.link));
    if(!chosen.length){ toast("선택된 기사가 없어요"); return; }
    deleteItems(chosen); exitPickMode();
  }else{
    $("copyMenu").classList.remove("open");
    $("delMenu").classList.toggle("open");
  }
});
$("delAll").addEventListener("click",(e)=>{ e.stopPropagation(); $("delMenu").classList.remove("open"); deleteItems(visibleItems()); });
$("delPick").addEventListener("click",(e)=>{ e.stopPropagation(); enterPickMode("delete"); });

// 바깥 클릭 시 메뉴 닫기
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".copywrap")){ $("copyMenu").classList.remove("open"); $("delMenu").classList.remove("open"); }
});
$("markAll").addEventListener("click",()=>{ALL.forEach(it=>seen.add(it.link));saveSeen();render();
  $("meta").textContent=$("meta").textContent.replace(/새 글 \d+개/,"새 글 0개");toast("모두 읽음 처리했어요");});

// ===== 출처 관리 (Firebase sources 실시간) =====
const sourcesRef = ref(database, "sources");
let SRC = {};   // {id: {name,url,cat,on}}
onValue(sourcesRef, (snap)=>{
  SRC = snap.val() || {};
  renderSrc();
});
function renderSrc(){
  const el=$("srcList");
  const ids=Object.keys(SRC);
  if(!ids.length){ el.innerHTML=`<p class="hint" style="margin-top:12px">아직 등록된 출처가 없어요. 아래에서 추가하거나, 크롤러가 한 번 돌면 기본 목록이 채워져요.</p>`; return; }
  el.innerHTML=ids.map(id=>{
    const s=SRC[id]||{};
    return `<div class="src">
      <input type="checkbox" data-id="${id}" ${s.on?"checked":""}>
      <div class="info"><div class="nm">${esc(s.name||"(이름없음)")} <span class="badge">${esc(s.cat||"기타")}</span></div>
      <div class="u">${esc(s.url||"")}</div></div>
      <button class="del" data-del="${id}" title="삭제">✕</button>
    </div>`;
  }).join("");
}
// 토글
$("srcList").addEventListener("change",(e)=>{
  const cb=e.target.closest("input[type=checkbox]"); if(!cb) return;
  update(ref(database,"sources/"+cb.dataset.id), { on: cb.checked })
    .then(()=>toast(cb.checked?"켰어요":"껐어요"))
    .catch(err=>toast("실패: "+err.message));
});
// 삭제
$("srcList").addEventListener("click",(e)=>{
  const b=e.target.closest("[data-del]"); if(!b) return;
  const s=SRC[b.dataset.del]||{};
  if(!confirm(`'${s.name||"이 출처"}'를 삭제할까요?`)) return;
  remove(ref(database,"sources/"+b.dataset.del))
    .then(()=>toast("삭제했어요"))
    .catch(err=>toast("실패: "+err.message));
});
// 추가
// ===== 지금 동기화 버튼 =====
$("sync").addEventListener("click", async ()=>{
  const btn=$("sync"); const orig=btn.textContent;
  btn.disabled=true; btn.textContent="동기화 중…";
  try{
    const res=await fetch("/.netlify/functions/run");
    const data=await res.json();
    if(data.ok){
      toast(data.added>0?`새 소식 ${data.added}개 추가! (총 ${data.total})`:`새 소식은 없어요 (총 ${data.total||0})`);
    }else{
      toast("동기화 실패: "+(data.error||"알 수 없는 오류"));
    }
  }catch(err){
    toast("동기화 실패: "+err.message);
  }finally{
    btn.disabled=false; btn.textContent=orig;
  }
});
$("addSrc").addEventListener("click",()=>{
  const url=$("newUrl").value.trim(), name=$("newName").value.trim(), cat=$("newCat").value;
  if(!/^https?:\/\//.test(url)){ toast("올바른 RSS 주소(https://)를 입력하세요"); return; }
  if(!name){ toast("이름을 입력하세요"); return; }
  push(sourcesRef, { name, url, cat, on: true })
    .then(()=>{ $("newUrl").value=""; $("newName").value=""; toast("추가했어요! 다음 크롤링부터 반영돼요"); })
    .catch(err=>toast("실패: "+err.message));
});
</script>
</body>
